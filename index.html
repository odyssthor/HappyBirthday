<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños!</title>
    <!-- Fuente del diseño de Amor -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ffd6e7;
            --heart: #ff2b4f;
            --messageBoxBg: rgba(139, 69, 119, 0.136);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Esto elimina el cuadro azul al tocar en móviles */
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-image: url('assets/back.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #00002a; 
            color: #fefae9;
            font-family: "Sour Gummy", system-ui, sans-serif;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            overflow-x: hidden;
            position: relative;
            cursor: pointer; 
        }

        /* === CAPA DE OSCURIDAD (FIXED) === */
        .background-overlay {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 15, 0.65);
            z-index: -4; 
            pointer-events: none;
        }

        /* === CONTENEDOR DE ESTRELLAS (FIXED) === */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -3; 
            overflow: hidden;
        }

        .stars-container::before,
        .stars-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background-repeat: repeat;
            pointer-events: none;
            will-change: opacity;
        }

        .stars-paused::before,
        .stars-paused::after {
            animation-play-state: paused;
        }

        /* PARTÍCULAS */
        .stars-container::before {
            background-image:
                radial-gradient(4px 4px at 20px 30px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 40px 80px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 90px 40px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 130px 20px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 170px 100px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 210px 50px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 250px 80px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 290px 30px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 330px 90px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 370px 60px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 410px 20px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 450px 80px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 25px 130px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 105px 190px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 185px 150px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 265px 210px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 345px 170px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 425px 230px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 65px 310px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 145px 290px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 485px 360px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 35px 260px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 195px 330px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 385px 85px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 125px 310px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 305px 55px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 55px 185px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 255px 155px, #fff 50%, transparent 51%),
                radial-gradient(5px 5px at 405px 285px, #fff 50%, transparent 51%);
            background-size: 500px 400px;
            animation: twinkleA 5s ease-in-out infinite;
            opacity: 1;
        }

        .stars-container::after {
            background-image:
                radial-gradient(3px 3px at 35px 45px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 75px 95px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 115px 25px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 155px 135px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 195px 75px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 235px 115px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 275px 55px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 315px 155px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 355px 35px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 395px 105px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 435px 175px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 475px 65px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 85px 195px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 125px 245px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 165px 215px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 205px 285px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 245px 225px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 285px 295px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 325px 265px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 365px 305px, #fff 50%, transparent 51%),
                radial-gradient(3px 3px at 55px 355px, #fff 50%, transparent 51%),
                radial-gradient(2px 2px at 225px 35px, #fff 50%, transparent 51%),
                radial-gradient(4px 4px at 305px 95px, #fff 50%, transparent 51%);
            background-size: 500px 350px;
            animation: twinkleB 7s ease-in-out infinite;
            opacity: 0.8;
        }

        @keyframes twinkleA { 
            0%, 100% { opacity: 1; } 20% { opacity: 0.2; } 40% { opacity: 0.9; } 60% { opacity: 0.1; } 80% { opacity: 1; }
        }
        @keyframes twinkleB { 
            0%, 100% { opacity: 0.7; } 25% { opacity: 0.1; } 50% { opacity: 1; } 75% { opacity: 0.2; }
        }

        /* TÍTULO SUPERIOR */
        .main-title {
            font-size: 2.8rem;
            color: #ff6b81;
            text-shadow: 0 0 15px rgba(255, 107, 129, 0.6);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
            position: relative;
            z-index: 100;
            font-family: "Sour Gummy", cursive;
            pointer-events: none;
        }

        /* REPRODUCTOR */
        .music-player {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--messageBoxBg);
            padding: 12px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,214,231,.3);
            box-shadow: 0 8px 32px rgba(255, 43, 79, 0.2);
            width: 90%;
            max-width: 380px;
            position: relative;
            z-index: 100;
            margin-bottom: 20px;
        }

        .play-pause-btn {
            background: rgba(255, 43, 79, 0.8);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 43, 79, 0.3);
            flex-shrink: 0;
        }

        .play-pause-btn:hover { background: rgba(255, 43, 79, 1); transform: scale(1.05); }

        .play-pause-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .progress-container { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }

        .song-info { font-size: 14px; color: var(--pink); font-weight: 500; margin-bottom: 2px; }

.styled-range {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.2); /* Fondo de la barra vacía */
    border-radius: 5px;
    cursor: pointer;
    background-image: linear-gradient(90deg, #ff2b4f, #ff5f7a); /* El color de relleno (gradiente) */
    background-size: 0% 100%; /* Inicialmente en 0 */
    background-repeat: no-repeat;
}

/* Estilo del Círculo (Thumb) para Chrome/Safari/Edge */
.styled-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 14px;
    width: 14px;
    border-radius: 50%;
    background: #fff; /* Círculo blanco o puedes ponerle #ff2b4f */
    box-shadow: 0 0 10px rgba(255, 43, 79, 0.8); /* Resplandor rosado */
    cursor: pointer;
    transition: transform 0.1s;
}

.styled-range::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}

/* Estilo del Círculo (Thumb) para Firefox */
.styled-range::-moz-range-thumb {
    height: 14px;
    width: 14px;
    border-radius: 50%;
    background: #fff;
    border: none;
    box-shadow: 0 0 10px rgba(255, 43, 79, 0.8);
    cursor: pointer;
}

        .time-display { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255, 214, 231, 0.8); }

        /* === IMAGEN MICHA === */
        .micha-wrapper {
            position: relative;
            width: 100vw;
            max-width: 900px;
            margin-top: 10px;
            margin-bottom: 10px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            animation: michaFall 1s 1.5s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
        }

        .micha-img {
            width: 100%;
            border-radius: 28px;
            filter: drop-shadow(0 22px 40px rgba(0, 0, 0, 0.7))
                    drop-shadow(0 0 30px rgba(255, 180, 120, 0.15));
        }

        @keyframes michaFall {
            0% {
                opacity: 0;
                transform: translateY(-650px) rotate(-4deg) scale(0.85);
            }
            55% {
                opacity: 1;
            }
            72% {
                transform: translateY(18px) rotate(1deg) scale(1.03);
            }
            88% {
                transform: translateY(-9px) rotate(-0.5deg) scale(0.99);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
        }

        /* TEXTO E IMAGEN */
        .message-container {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 0 20px;
            z-index: 100;
            position: relative;
            pointer-events: none;
        }

        .message-container p {
            color: #e0e0e0;
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 300;
            font-family: "Sour Gummy", cursive;
        }

        .birthday-img {
            margin-top: 10px;
            width: 90%;
            max-width: 280px;
            border-radius: 55px;
            border: 3px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            position: relative;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .micha-wrapper {
                width: 100vw;
                max-width: 100vw;
                margin-left: -20px;
                border-radius: 0;
            }
            .micha-img {
                border-radius: 16px;
            }
        }

        @media (max-height: 700px) {
            .micha-wrapper {
                max-width: 680px;
            }
        }

        /* === PANTALLA DE INTRODUCCIÓN === */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: #faf8f4;
            z-index: 9999;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.9s ease;
        }

        #intro-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .intro-content {
            padding: 52px 36px 0;
            flex: 1;
        }

        .intro-name {
            font-size: 3.6rem;
            color: #1e1e1e;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            line-height: 1.05;
            margin-bottom: 6px;
        }

        .intro-subtitle {
            font-size: 0.72rem;
            color: #8a7a5a;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-family: "Sour Gummy", sans-serif;
            margin-bottom: 32px;
        }

        .intro-text {
            font-size: 2.4rem;
            color: #1e1e1e;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.2;
        }

        .intro-flower {
            position: absolute;
            bottom: -30px;
            left: -20px;
            width: 68%;
            max-width: 320px;
            pointer-events: none;
        }

        .intro-hint {
            position: absolute;
            bottom: 28px;
            right: 28px;
            font-size: 0.82rem;
            color: #b0a090;
            font-family: "Sour Gummy", sans-serif;
            animation: pulseHint 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE INTRODUCCIÓN -->
    <div id="intro-screen">
        <div class="intro-content">
            <h1 class="intro-name">Mariella</h1>
            <p class="intro-subtitle">Para nuestra querida mamá</p>
            <p class="intro-text">Esta es la historia<br>de alguien muy<br>especial...</p>
        </div>
        <img src="https://www.dropbox.com/scl/fi/uczdvknp2w39ipo3geij7/flor.png?rlkey=q76qnn9yv1zv678zvhwl4lnvl&st=7ftes4qj&raw=1" class="intro-flower" alt="">
        <p class="intro-hint">Toca para continuar ✦</p>
    </div>

    <div class="background-overlay"></div>
    <div class="stars-container"></div>

    <h1 class="main-title">¡Feliz cumpleaños!</h1>

    <div class="music-player" id="playerContainer">
        <button class="play-pause-btn" id="playPauseBtn">
            <svg id="playIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </button>
<!-- DENTRO DE <div class="music-player" id="playerContainer"> -->

        <div class="progress-container">
            
            <!-- CAMBIO AQUÍ: Usamos un input range en lugar de divs anidados -->
            <input type="range" class="styled-range" id="progressBar" value="0" max="100">
            
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" loop preload="none">
        <source src="https://www.dl.dropboxusercontent.com/scl/fi/sficq9d89h06dr4qqxfyz/sound1.mp3?rlkey=hwukbya1m0bxz6d6401ya3etv&st=j8p8sm9d" type="audio/mpeg">
    </audio>

    <div class="micha-wrapper">
        <img src="https://www.dropbox.com/scl/fi/4ifb3s0bykojx6zry3ayl/micha.webp?rlkey=6epwiw3drlwjoskozghanot66&st=7o2ox0ty&raw=1" alt="Torta de cumpleaños con perro y gato" class="micha-img">
    </div>

    <div class="message-container">
        <p>Te deseo un día especial, lleno de alegría y rodeado de buenos momentos. ¡Feliz cumpleaños!</p>
    </div>
    

    <img src="https://media.tenor.com/tPJaogUqo8wAAAAM/happy-birthday.gif" alt="Birthday Celebration" class="birthday-img" loading="lazy">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const playerContainer = document.getElementById('playerContainer');

        let isPlaying = false;

        function showPlayIcon() {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }

        function showPauseIcon() {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        }

        function launchConfettiShower() {
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        playPauseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                showPlayIcon();
                isPlaying = false;
            } else {
                audio.play();
                showPauseIcon();
                isPlaying = true;
                launchConfettiShower();
            }
        });

        let lastClickConfetti = 0;
        document.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastClickConfetti < 400) return;
            lastClickConfetti = now;

            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            confetti({
                particleCount: 60,
                spread: 100,
                origin: { x: x, y: y },
                gravity: 1.2,
                ticks: 200,
                scalar: 0.9
            });
        });

        playerContainer.addEventListener('click', (e) => {
            e.stopPropagation();
        });
        // 1. Actualizar barra mientras suena
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                // Calcular porcentaje
                const progress = (audio.currentTime / audio.duration) * 100;
                
                // Mover el círculo
                progressBar.value = progress;
                
                // "Pintar" el fondo de la barra hasta el círculo
                progressBar.style.backgroundSize = `${progress}% 100%`;
                
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        });

        // 2. Permitir adelantar/atrasar moviendo el círculo (Input Event)
        progressBar.addEventListener('input', () => {
            const time = (progressBar.value / 100) * audio.duration;
            audio.currentTime = time;
            
            // Actualizar el color de fondo manualmente mientras arrastras
            progressBar.style.backgroundSize = `${progressBar.value}% 100%`;
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // === PAUSA ESTRELLAS DURANTE SCROLL ===
        const starsContainer = document.querySelector('.stars-container');
        let scrollEndTimer;
        window.addEventListener('scroll', () => {
            starsContainer.classList.add('stars-paused');
            clearTimeout(scrollEndTimer);
            scrollEndTimer = setTimeout(() => {
                starsContainer.classList.remove('stars-paused');
            }, 150);
        }, { passive: true });

        // === INTRO SCREEN ===
        const introScreen = document.getElementById('intro-screen');

        introScreen.addEventListener('click', () => {
            introScreen.classList.add('fade-out');
            // Autoplay audio
            audio.play().catch(() => {});
            showPauseIcon();
            isPlaying = true;
            launchConfettiShower();
            // Remove from DOM after fade
            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 900);
        });
    </script>
</body>
</html>
